name: Auto Release on Changelog

on:
  push:
    branches: [main]
    paths:
      - 'changelogs/*.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find latest changelog
        id: meta
        run: |
          LATEST=$(ls -t changelogs/*.md 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then
            echo "No changelog found, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(basename "$LATEST" .md)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "file=$LATEST" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        if: steps.meta.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          FILE="${{ steps.meta.outputs.file }}"
          echo "Processing $VERSION from $FILE"
          if gh release view "$VERSION" &>/dev/null; then
            echo "Release $VERSION exists, updating..."
            gh release edit "$VERSION" --title "$VERSION" --notes-file "$FILE"
          else
            echo "Creating release $VERSION..."
            gh release create "$VERSION" --title "$VERSION" --notes-file "$FILE" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
